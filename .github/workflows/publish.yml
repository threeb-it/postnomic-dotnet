name: Publish NuGet Packages

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']  # v1.0.0, v1.0.0-beta.1, etc.

jobs:
  build-test-pack:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # MinVer needs full history

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Postnomic.Client.slnx

    - name: Build
      run: dotnet build Postnomic.Client.slnx -c Release --no-restore

    - name: Test
      run: dotnet test Postnomic.Client.slnx -c Release --no-build

    - name: Pack
      run: dotnet pack Postnomic.Client.slnx -c Release --no-build -o ./artifacts

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
        retention-days: 30

  publish-github:
    needs: build-test-pack
    runs-on: ubuntu-latest
    steps:
    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish to GitHub Packages
      run: >
        dotnet nuget push "./artifacts/*.nupkg"
        --source "https://nuget.pkg.github.com/threeb-it/index.json"
        --api-key ${{ secrets.GITHUB_TOKEN }}
        --skip-duplicate

  publish-nuget:
    needs: build-test-pack
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: nuget-publish
    steps:
    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish to NuGet.org
      run: >
        dotnet nuget push "./artifacts/*.nupkg"
        --source "https://api.nuget.org/v3/index.json"
        --api-key ${{ secrets.NUGET_API_KEY }}
        --skip-duplicate
