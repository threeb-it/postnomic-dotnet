name: Publish NuGet Packages

permissions:
  contents: write
  packages: write

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  build-test-pack:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # MinVer needs full history
        fetch-tags: true  # MinVer needs tags to determine version

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Postnomic.Client.slnx

    - name: Build
      run: dotnet build Postnomic.Client.slnx -c Release --no-restore

    - name: Test
      run: dotnet test Postnomic.Client.slnx -c Release --no-build

    - name: Pack
      run: dotnet pack Postnomic.Client.slnx -c Release --no-build -o ./artifacts

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts/*.nupkg
        retention-days: 30

  publish-github:
    needs: build-test-pack
    runs-on: ubuntu-latest
    steps:
    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish to GitHub Packages
      run: |
        SOURCE="https://nuget.pkg.github.com/threeb-it/index.json"
        KEY="${{ secrets.GITHUB_TOKEN }}"
        # Push in dependency order to avoid transient resolution failures
        dotnet nuget push ./artifacts/Postnomic.Client.Abstractions.*.nupkg --source "$SOURCE" --api-key "$KEY" --skip-duplicate
        dotnet nuget push ./artifacts/Postnomic.Client.[0-9]*.nupkg          --source "$SOURCE" --api-key "$KEY" --skip-duplicate
        dotnet nuget push ./artifacts/Postnomic.Client.AspNetCore.*.nupkg    --source "$SOURCE" --api-key "$KEY" --skip-duplicate
        dotnet nuget push ./artifacts/Postnomic.Client.Blazor.*.nupkg        --source "$SOURCE" --api-key "$KEY" --skip-duplicate

  publish-nuget:
    needs: build-test-pack
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: nuget-publish
    steps:
    - uses: actions/checkout@v4

    - name: Download packages
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish to NuGet.org
      run: |
        SOURCE="https://api.nuget.org/v3/index.json"
        KEY="${{ secrets.NUGET_API_KEY }}"
        # Push in dependency order to avoid transient resolution failures
        dotnet nuget push ./artifacts/Postnomic.Client.Abstractions.*.nupkg --source "$SOURCE" --api-key "$KEY" --skip-duplicate
        dotnet nuget push ./artifacts/Postnomic.Client.[0-9]*.nupkg          --source "$SOURCE" --api-key "$KEY" --skip-duplicate
        dotnet nuget push ./artifacts/Postnomic.Client.AspNetCore.*.nupkg    --source "$SOURCE" --api-key "$KEY" --skip-duplicate
        dotnet nuget push ./artifacts/Postnomic.Client.Blazor.*.nupkg        --source "$SOURCE" --api-key "$KEY" --skip-duplicate

    - name: Upload packages to GitHub Release
      run: gh release upload "${{ github.event.release.tag_name }}" ./artifacts/*.nupkg --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
