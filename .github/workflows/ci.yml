name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # MinVer needs full history
        fetch-tags: true  # MinVer needs tags to determine version

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore Postnomic.Client.slnx

    - name: Build
      run: dotnet build Postnomic.Client.slnx -c Release --no-restore

    - name: Test
      run: dotnet test Postnomic.Client.slnx -c Release --no-build --logger "trx;LogFileName=results.trx"

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/*.trx'
        retention-days: 7
